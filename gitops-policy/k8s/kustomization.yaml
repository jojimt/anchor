apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openshell
configMapGenerator:
  - name: openshell-policy
    files:
      - policy.yaml=../policy.yaml
    options:
      labels:
        app.kubernetes.io/part-of: openshell
        app.kubernetes.io/component: policy-gitops
resources:
  - rbac-policy-syncer.yaml
  - job-sync-global-policy.yaml
