apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-policy-syncer
  labels:
    app.kubernetes.io/part-of: openshell
    app.kubernetes.io/component: policy-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-policy-syncer
  labels:
    app.kubernetes.io/part-of: openshell
    app.kubernetes.io/component: policy-gitops
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-policy-syncer
  labels:
    app.kubernetes.io/part-of: openshell
    app.kubernetes.io/component: policy-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-policy-syncer
subjects:
  - kind: ServiceAccount
    name: openshell-policy-syncer
    namespace: openshell
