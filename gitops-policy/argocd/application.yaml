apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshell-policies
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jojimt/anchor.git
    targetRevision: main
    path: gitops-policy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: openshell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
