# Organization baseline — synced to OpenShell gateway (global policy) and compiled
# into Kubernetes NetworkPolicy manifests for defense-in-depth.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github_api:
    name: github-api-readonly
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/gh }
  google_api:
    name: google-api
    endpoints:
      - host: googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
    binaries:
      - { path: /usr/bin/curl }
  wiki_api:
    name: wiki-api
    endpoints:
      - host: wikipedia.com
        port: 443
        protocol: rest
        enforcement: enforce
    binaries:
      - { path: /usr/bin/curl }
